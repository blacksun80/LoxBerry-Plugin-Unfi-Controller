home:
  route: "/"
  controller: 'LoxBerryUnifiPlugin\Controller\HomeController'
  action: "indexPage"

logs:
  route: "/logs"
  controller: 'LoxBerryUnifiPlugin\Controller\HomeController'
  action: "logsPage"

containerlogs:
  route: "/containerlogs"
  controller: 'LoxBerryUnifiPlugin\Controller\HomeController'
  action: "containerLogsPage"

statusfragment:
  route: "/statusfragment"
  controller: 'LoxBerryUnifiPlugin\Controller\HomeController'
  action: "statusFragment"

diagnostics:
  route: "/diagnostics"
  controller: 'LoxBerryUnifiPlugin\Controller\HomeController'
  action: "diagnosticsPage"

upgrade:
  route: "/upgrade"
  controller: 'LoxBerryUnifiPlugin\Controller\HomeController'
  method: 'POST'
  action: "upgrade"

reset:
  route: "/reset"
  controller: 'LoxBerryUnifiPlugin\Controller\HomeController'
  method: 'POST'
  action: "reset"

unifi:
  route: "/unifi"
  controller: 'LoxBerryUnifiPlugin\Controller\HomeController'
  action: "unifiPage"
#  Full configuration could look like this:
#  someRoute:
#    route: '/'
#    controller: 'LoxBerryUnifiPlugin\Controller\SomeController'
#    method: 'GET,POST' <- GET is assumed if not provided
#    public: true <- false is assumed if not provided
