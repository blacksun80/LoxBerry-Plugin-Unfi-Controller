help_title=Help
help_explanation=
open_ui=Open UniFi Network Controller
home_explanation=The UniFi Network Controller user interface can be accessed on port 8443.
service_status=Service status
service_status_help=Shows the status of the unifi service. 
container_version=Container version
container_version_help=Version of the container that contains the unifi controller software.
container_version_help_bold=The container version can be changed below
controller_version=Controller version
controller_version_help=Version of the unifi controller. 'starting' means that the controller is starting and the version cannot be read. Caution: The start can take serveral minutes.
settings=Version
settings_desc=In this section you can change the version of the unifi controller container
settings_save=Change container version
settings_save_hint=CAUTION: if you downgrade the container version the controller may not start because it cannot downgrade the configuration. The change may take serveral Minutes.
architecture_notice=Note: The manufacturer no longer provides newer container versions for this system's processor architecture (%architecture%). Only versions available for this architecture are shown.
reset_title=Reset
reset_desc=If the service is stuck (e.g. "failed", a container stuck in "Created", or referencing a network that was deleted after a crash): recreate the containers. Data (UniFi config, MongoDB) is preserved - only the containers themselves are removed and recreated.
reset_button=Reset service
reset_hint=Removes both containers (app + database) and restarts the service, which recreates them automatically. No data is lost.
reset_confirm=Containers will be removed and recreated (data is preserved). Continue?
container_logs=Container logs
container_logs_desc=Live output of the UniFi container. After clicking "Change container version" you can watch here directly what happens (image download, start, MongoDB, Java).
autorefresh=Auto-refresh (5s)
open_logs_fullpage=Full page view
open_diagnostics=Diagnostics (all logs)
serverlog_title=UniFi server log (server.log) — controller startup
docker_title=Container init log (docker logs)
configuration=configuration
configuration_info=To get adoption working correctly the controller hostname and inform-url has to be set.
configuration_howto=Login to the webinterface and open UniFI settings->Controller, enable "Override inform host with controller hostname/IP", and provide the LAN IP address of the loxberry in the field "Hostname"
[logs]
headline=Logfiles
cron_explanation=A list of logfiles for the CronJob execution will be displayed here as soon as you execute cronjobs. The starter package contains a demo cron job which will be executed every 15 minutes.

[containerlogs]
headline=Container logs
description=Two log sources: the UniFi server.log (what the controller is doing) and the docker container logs (init & crashes). Lets you tell whether the controller is still working.
refresh=Refresh
autorefresh=Auto-refresh (5s)
back=Back to overview
serverlog_title=UniFi server log (server.log)
serverlog_desc=The actual controller log: MongoDB, database init, "Starting Web Server" etc. This is where you see progress during "starting".
docker_title=Container init log (docker logs)
docker_desc=Container stdout: only the early startup phase (s6 init, memory limit) and any crashes before server.log exists.

[diagnostics]
headline=Diagnostics
description=Collects everything relevant in one place: systemd status (with the actual failure reason, e.g. a port conflict or missing network), container states, free disk space, and the logs of the app container, the database container, and the UniFi server.log. Meant to be copied when something fails to start.
refresh=Refresh
