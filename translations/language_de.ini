[home]
help_title=Hilfe
help_explanation=
open_ui=UniFi Network Controller Oberfläche öffnen
home_explanation=Die UniFi Network Controller Oberfläche kann auf Port 8443 aufgerufen werden
service_status=Service status
service_status_help=Gibt den Status des UniFi service an.
container_version=Container Version
container_version_help=Version des Containers, der die Unifi Controller Software enthält.
container_version_help_bold=Die Version des Containers kann im nächsten Abschnitt geändert werden.
controller_version= Controller Version
controller_version_help=Version des Unifi Controllers. 'starting' bedeutet, dass der Controller gerade startet und die Version noch nicht gelesen werden kann. Achtung: Der Start kann mehrere Minuten dauern.
settings=Version
settings_desc=In diesem Abschnitt kann die Version des Unifi Controller Containers geändert werden.
settings_save=Container version ändern
settings_save_hint=ACHTUNG: Wenn eine niedrigere Version verwendet wird, kann es sein, dass der Controller nicht startet, da er die Konfiguration nicht verarbeiten kann. Der Vorgang kann mehrere Minuten dauern.
architecture_notice=Hinweis: Für die Prozessor-Architektur dieses Systems (%architecture%) stellt der Hersteller keine neueren Container-Versionen mehr zur Verfügung. Es werden nur die Versionen angezeigt, die für diese Architektur verfügbar sind.
reset_title=Zurücksetzen
reset_desc=Falls der Dienst hängt (z.B. "failed", ein Container bleibt im Zustand "Created" stecken, oder nach einem Absturz auf ein gelöschtes Netzwerk verweist): Container neu erstellen. Die Daten (UniFi-Konfiguration, MongoDB) bleiben dabei erhalten, es werden nur die Container selbst entfernt und neu angelegt.
reset_button=Dienst zurücksetzen
reset_hint=Entfernt beide Container (App + Datenbank) und startet den Dienst neu, der sie automatisch neu erstellt. Keine Daten gehen verloren.
reset_confirm=Container werden entfernt und neu erstellt (Daten bleiben erhalten). Fortfahren?
container_logs=Container-Logs
container_logs_desc=Live-Ausgabe des UniFi-Containers. Nach einem Klick auf "Container version ändern" siehst du hier direkt, was passiert (Image-Download, Start, MongoDB, Java).
autorefresh=Auto-Refresh (5s)
open_logs_fullpage=Große Ansicht
open_diagnostics=Diagnose (alle Logs)
serverlog_title=UniFi Server-Log (server.log) — Controller-Start
docker_title=Container-Init-Log (docker logs)
configuration=Konfiguration
configuration_info=Damit die Einbindung von Geräten richtig funktioniert muss der Controller-Hostname gesetzt und der `inform-host` überschrieben werden.
configuration_howto=Loggen Sie sich im Webinterface ein und gehen Sie auf "Einstellungen->Controller" und setzten sie den Haken bei "Inform-Hostnamen mit Controller-Hostnamen/IP überschreiben" und geben Sie die IP Adresse oder den Hostnamen des Loxberry in das Feld "Controller Name" ein.
[logs]
headline=Log-Dateien
cron_explanation=Hier wird eine Liste mit Log-Dateien zu CronJobs dargestellt, sobald diese ausgeführt werden. Im Starter-Set ist ein Demo-Cronjob enthalten, der alle 15 Minuten ausgeführt wird.

[containerlogs]
headline=Container-Logs
description=Zwei Log-Quellen: die UniFi-server.log (was der Controller gerade tut) und die docker-Container-Logs (Init & Abstürze). So erkennst du, ob der Controller noch arbeitet.
refresh=Aktualisieren
autorefresh=Auto-Refresh (5s)
back=Zurück zur Übersicht
serverlog_title=UniFi Server-Log (server.log)
serverlog_desc=Das eigentliche Controller-Log: MongoDB, Datenbank-Init, "Starting Web Server" usw. Hier siehst du den Fortschritt während "starting".
docker_title=Container-Init-Log (docker logs)
docker_desc=Stdout des Containers: nur die frühe Startphase (s6-Init, Speicherlimit) und eventuelle Abstürze, bevor die server.log entsteht.

[diagnostics]
headline=Diagnose
description=Sammelt alles Relevante an einem Ort: systemd-Status (mit der eigentlichen Fehlermeldung, z.B. Portkonflikt oder fehlendes Netzwerk), Container-Zustände, freier Speicherplatz sowie die Logs von App-Container, Datenbank-Container und UniFi server.log. Zum Kopieren gedacht, falls etwas nicht startet.
refresh=Aktualisieren
back=Zurück zur Übersicht

