---
# UniFi Network Application (successor of the deprecated unifi-controller image)
# plus its now-required external MongoDB.
#
# Requires a 64-bit host (amd64 / arm64). There are no arm32 images for these.
#
# The MongoDB password (MONGO_PASS) is generated automatically at install time
# and stored in the plugin's env file; ${MONGO_PASS} is substituted from there.
# init-mongo.js gets the same generated value written in by postroot.sh.
services:
  unifi-network-application:
    image: lscr.io/linuxserver/unifi-network-application:${VERSION}
    container_name: unifi-network-application
    env_file:
      - REPLACELBPCONFIGDIR/unifi.env
    environment:
      - MONGO_USER=unifi
      - MONGO_PASS=${MONGO_PASS}
      - MONGO_HOST=unifi-db
      - MONGO_PORT=27017
      - MONGO_DBNAME=unifi
      - MEM_LIMIT=1024                 #optional - max Java heap in MB (number only)
      - MEM_STARTUP=256               #optional - initial Java heap in MB
    volumes:
      - REPLACELBPDATADIR/data:/config
    ports:
      - 8443:8443
      - 3478:3478/udp
      - 10001:10001/udp
      - 8080:8080
      - 1900:1900/udp #optional
      - 8843:8843 #optional
      - 8880:8880 #optional
      - 6789:6789 #optional
      - 5514:5514/udp #optional
    depends_on:
      - unifi-db
    restart: unless-stopped

  unifi-db:
    # mongo:4.4 runs on arm64 (Pi 4/5) and does not require AVX on x86.
    image: docker.io/mongo:4.4
    container_name: unifi-db
    volumes:
      - REPLACELBPDATADIR/db:/data/db
      - REPLACELBPDATADIR/src/Docker/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    restart: unless-stopped
